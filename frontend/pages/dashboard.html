<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard · Learnove</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;min-height:100vh;padding:20px;
      background:linear-gradient(135deg,#f0d6e8 0%,#e8d0f0 25%,#d6c8f5 50%,#c8d8f8 75%,#d0e8f8 100%)}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.45;pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:radial-gradient(circle,#f7c8e8,transparent);top:-100px;left:-100px}
    .blob-2{width:600px;height:600px;background:radial-gradient(circle,#c8d0f8,transparent);bottom:-150px;right:-150px}
    .wrapper{position:relative;z-index:1;max-width:1100px;margin:0 auto}
    /* Top bar */
    .top-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:14px 24px;margin-bottom:24px}
    .brand{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:3px;background:linear-gradient(145deg,#321d47,#6b3f8c);-webkit-background-clip:text;background-clip:text;color:transparent}
    .user-info{display:flex;align-items:center;gap:12px}
    .user-avatar-placeholder{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#b06fd0,#80b8f0);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.85rem}
    .user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(176,111,208,.5)}
    .user-name{font-weight:700;color:#321d47}
    .user-role{font-size:.75rem;color:#7a5a9a}
    .logout-btn{padding:8px 20px;border:1.5px solid rgba(176,111,208,.4);border-radius:20px;background:transparent;color:#6b3f8c;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s}
    .logout-btn:hover{background:rgba(176,111,208,.1)}
    /* Verify banner */
    .verify-banner{display:none;align-items:center;gap:12px;background:rgba(255,193,7,.12);border:1px solid rgba(255,152,0,.4);border-radius:16px;padding:14px 20px;margin-bottom:20px}
    .verify-banner.show{display:flex}
    .verify-banner p{color:#5a3a00;font-size:.9rem;flex:1}
    .verify-banner button{padding:8px 20px;background:linear-gradient(135deg,#b06fd0,#80b8f0);color:white;border:none;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap}
    /* Grid */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
    .card{background:rgba(255,255,255,.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:22px}
    .card-label{font-size:.78rem;font-weight:700;color:#7a5a9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .card-value{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:#321d47}
    .card-sub{font-size:.8rem;color:#9a8aaa;margin-top:4px}
    .card-icon{font-size:1.8rem;margin-bottom:8px}
    /* Profile card */
    .profile-card{background:rgba(255,255,255,.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:28px;margin-bottom:20px}
    .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:20px}
    .profile-big-placeholder{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#b06fd0,#80b8f0);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1.4rem;border:3px solid rgba(255,255,255,.6)}
    .profile-big-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(176,111,208,.4)}
    .profile-details h2{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:#321d47;margin-bottom:4px}
    .profile-details p{color:#7a5a9a;font-size:.88rem}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:rgba(176,111,208,.15);color:#6b3f8c;border:1px solid rgba(176,111,208,.25);margin-top:4px}
    .badge.unverified{background:rgba(255,152,0,.12);color:#e65100;border-color:rgba(255,152,0,.3)}
    .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .info-item label{font-size:.75rem;font-weight:700;color:#9a8aaa;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
    .info-item p{font-size:.9rem;color:#321d47;font-weight:600}
    /* Loading */
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
    .spinner{width:44px;height:44px;border:4px solid rgba(176,111,208,.2);border-top-color:#b06fd0;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Orbitron',sans-serif;color:#6b3f8c;font-size:.9rem;letter-spacing:1px}
    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;min-width:260px;max-width:380px;padding:14px 20px;background:white;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font-family:'Nunito',sans-serif;font-size:.9rem;color:#321d47;display:flex;align-items:center;gap:10px;transform:translateY(100px);opacity:0;transition:all .35s cubic-bezier(.34,1.3,.64,1);border-left:4px solid #b06fd0;z-index:9999}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{border-left-color:#43a047}
    .toast.error{border-left-color:#e53935}
    @media(max-width:768px){.grid{grid-template-columns:1fr 1fr}.info-grid{grid-template-columns:1fr}.top-bar .brand{display:none}}
    @media(max-width:480px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper" id="wrapper" style="display:none">
    <div class="top-bar">
      <div class="brand">LEARNOVE</div>
      <div class="user-info">
        <div id="avatarDisplay"></div>
        <div>
          <div class="user-name" id="userName">…</div>
          <div class="user-role" id="userRole">…</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>

    <div class="verify-banner" id="verifyBanner">
      <span>⚠️</span>
      <p>Your email hasn't been verified yet. Check your inbox and click the verification link.</p>
      <button id="resendVerifyBtn">Resend Email</button>
    </div>

    <div class="profile-card">
      <div class="profile-header">
        <div id="bigAvatarDisplay"></div>
        <div class="profile-details">
          <h2 id="profileName">Loading…</h2>
          <p id="profileEmail">…</p>
          <span class="badge" id="profileBadge">…</span>
          <span class="badge unverified" id="unverifiedBadge" style="display:none;margin-left:4px;">Email Unverified</span>
        </div>
      </div>
      <div class="info-grid" id="infoGrid"></div>
    </div>

    <div class="grid">
      <div class="card"><div class="card-icon">📚</div><div class="card-label">Enrolled Courses</div><div class="card-value">0</div><div class="card-sub">Start exploring</div></div>
      <div class="card"><div class="card-icon">⏱️</div><div class="card-label">Study Hours</div><div class="card-value">0</div><div class="card-sub">This month</div></div>
      <div class="card"><div class="card-icon">🏆</div><div class="card-label">Certificates</div><div class="card-value">0</div><div class="card-sub">Keep learning!</div></div>
    </div>

    <div style="text-align:center;margin-top:10px;">
      <a href="/" style="color:#b06fd0;font-weight:700;text-decoration:none;font-size:.9rem;">← Back to Homepage</a>
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">Loading your dashboard…</div>
  </div>

  <div id="toast" class="toast">
    <span id="toastIcon"></span>
    <span id="toastMsg"></span>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { SUPABASE_URL, SUPABASE_ANON_KEY, API_URL } from '../js/supabase-config.js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: sessionStorage, autoRefreshToken: true, persistSession: true }
    });

    function showToast(msg, type = 'info') {
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      document.getElementById('toastIcon').textContent = icons[type] || 'ℹ️';
      document.getElementById('toastMsg').textContent  = msg;
      const t = document.getElementById('toast');
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    }

    async function apiFetch(endpoint, token) {
      const res = await fetch(`${API_URL}${endpoint}`, {
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
      });
      return res.json();
    }

    function renderDashboard(user) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('wrapper').style.display = 'block';

      document.getElementById('userName').textContent = user.name.split(' ')[0];
      document.getElementById('userRole').textContent = (user.role || 'user').charAt(0).toUpperCase() + (user.role || 'user').slice(1);

      const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

      document.getElementById('avatarDisplay').innerHTML = user.profile?.avatar
        ? `<img src="${escHtml(user.profile.avatar)}" class="user-avatar" alt="${escHtml(user.name)}">`
        : `<div class="user-avatar-placeholder">${escHtml(initials)}</div>`;

      document.getElementById('bigAvatarDisplay').innerHTML = user.profile?.avatar
        ? `<img src="${escHtml(user.profile.avatar)}" class="profile-big-avatar" alt="${escHtml(user.name)}">`
        : `<div class="profile-big-placeholder">${escHtml(initials)}</div>`;

      document.getElementById('profileName').textContent  = user.name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileBadge').textContent = user.account_type === 'student' ? '🎓 Student' : '🧑‍💼 Individual';

      if (!user.is_email_verified) {
        document.getElementById('verifyBanner').classList.add('show');
        document.getElementById('unverifiedBadge').style.display = 'inline-block';
      }

      const createdDate = user.created_at
        ? new Date(user.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
        : '—';

      const infoItems = [
        { label: 'Account Type',  value: user.account_type || '—' },
        { label: 'Member Since',  value: createdDate },
        user.profile?.education_level && { label: 'Education Level', value: user.profile.education_level },
        user.profile?.institution     && { label: 'Institution',     value: user.profile.institution },
        user.profile?.major           && { label: 'Field of Study',  value: user.profile.major },
        user.profile?.interests?.length && { label: 'Interests',     value: user.profile.interests.join(', ') }
      ].filter(Boolean);

      document.getElementById('infoGrid').innerHTML = infoItems.map(i =>
        `<div class="info-item"><label>${escHtml(i.label)}</label><p>${escHtml(String(i.value))}</p></div>`
      ).join('');
    }

    async function resendVerification(token) {
      try {
        const data = await fetch(`${API_URL}/auth/resend-verification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        }).then(r => r.json());
        showToast(data.success ? 'Verification email sent!' : (data.error || 'Could not send email'), data.success ? 'success' : 'error');
      } catch { showToast('Could not send email.', 'error'); }
    }

    async function doLogout(session) {
      try {
        await fetch(`${API_URL}/auth/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
      } catch {}
      await supabase.auth.signOut();
      window.location.href = '/';
    }

    // ── Auth guard ─────────────────────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      window.location.href = '/?action=login';
    } else {
      try {
        const token = session.access_token;
        const data  = await apiFetch('/auth/me', token);
        if (!data.success) {
          await supabase.auth.signOut();
          window.location.href = '/?action=login';
        } else {
          renderDashboard(data.data);

          document.getElementById('logoutBtn').addEventListener('click', () => doLogout(session));

          document.getElementById('resendVerifyBtn')?.addEventListener('click', async () => {
            const { data: { session: s } } = await supabase.auth.getSession();
            if (s) await resendVerification(s.access_token);
          });
        }
      } catch {
        showToast('Could not load dashboard. Redirecting…', 'error');
        setTimeout(() => window.location.href = '/', 2000);
      }
    }
  </script>
</body>
</html>
